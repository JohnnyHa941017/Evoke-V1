<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg" fill="none" stroke="currentColor">
  <!-- Outer circle representing the whole self -->
  <circle cx="50" cy="50" r="45" stroke-width="1.5" opacity="0.6"/>
  
  <!-- Inner circle representing inner reflection -->
  <circle cx="50" cy="50" r="30" stroke-width="1.5" opacity="0.8"/>
  
  <!-- Vertical line of reflection/symmetry -->
  <line x1="50" y1="20" x2="50" y2="80" stroke-width="1" opacity="0.5"/>
  
  <!-- Left arc - representing introspection -->
  <path d="M 50 30 Q 35 50 50 70" stroke-width="1.5" opacity="0.7"/>
  
  <!-- Right arc - representing reflection -->
  <path d="M 50 30 Q 65 50 50 70" stroke-width="1.5" opacity="0.7"/>
</svg>
